<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MandarinOS UI Shell</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:,">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MandarinOS UI Shell</h1>
      </header>
      <main>
        <section class="left">
          <div class="controls">
            <label for="frameSelect">Frame:</label>
            <select id="frameSelect">
              <!-- frames populated dynamically by loadPackFramesIntoDropdown -->

            </select>
            <button id="runBtn">Run Turn</button>
          </div>

          <!-- Phase 7.3: frame sentence rendering -->
          <h2>Frame Sentence</h2>
          <div id="frameSentence" class="frame-sentence"></div>

          <div id="hintPinyin"  class="hint-row hint-pinyin"  style="display:none;"></div>
          <div id="hintMeaning" class="hint-row hint-meaning"  style="display:none;"></div>
    <div id="hintEtymology" class="hint-row hint-etymology" style="display:none;"></div>
          <button id="hintBtn"  class="hint-btn"               style="display:none;">Hint →</button>

          <h2>Trace</h2>
          <pre id="trace" class="trace">(no trace)</pre>
        </section>
        <aside class="right">
          <h2>Card Panel</h2>
          <div id="dataBuildInfo" class="muted">Data: (unknown)</div>
          <div id="cardPanel" class="card hidden">
            <div id="cardError" class="error"></div>
            <button id="playBtn" class="play">Play</button>
            <button id="cardCloseBtn" type="button">✕</button>
            <div id="cardId"></div>
            <h3 id="cardTitle"></h3>
            <div id="cardBody"></div>
          </div>
          <div id="noCard" class="nocard">No card opened</div>
        </aside>
      </main>
    </div>
    <style>
      section.left {
        overflow: visible;
      }
      .frame-sentence {
        font-size: 1.2rem;
        line-height: 2;
        min-height: 2.5rem;
        height: auto;
        overflow: visible;
        white-space: normal;
        margin-bottom: 0.5rem;
      }
      .frame-lit-token {
        color: #111;
        display: inline;
      }
      .frame-word-token {
        color: #1a56db;
        text-decoration: underline;
        cursor: pointer;
        display: inline;
      }
    </style>
    <script type="module" src="/app.js"></script>
  </body>
</html>
