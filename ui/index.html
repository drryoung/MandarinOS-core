<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MandarinOS UI Shell</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:,">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MandarinOS UI Shell</h1>
      </header>
      <main>
        <section class="left">
          <div class="controls">
            <label for="frameSelect">Frame:</label>
            <select id="frameSelect">
              <!-- frames populated dynamically by loadPackFramesIntoDropdown -->
            </select>
            <button id="runBtn">Run Turn</button>
            <button id="nextBtn" type="button" title="Next question (same topic)">Next</button>
            <button id="changeTopicBtn" type="button" title="Switch to another topic (bridge)">Change topic</button>
            <button id="startFreshBtn" type="button" title="Clear all memory and start as a new learner" style="margin-left:1em;color:#c0392b;border-color:#c0392b;">↺ Start Fresh</button>
          </div>
          <!-- Phase 11C: Persona selector -->
          <div class="persona-bar" id="personaBar">
            <span class="persona-bar-label">Partner:</span>
            <div id="personaBtns" class="persona-btn-row">
              <!-- populated from /api/personas -->
            </div>
          </div>

          <!-- Phase 8: Conversation = record of what was said; Active = last statement from MandarinOS -->
          <h2>Conversation</h2>
          <div id="rememberedFacts" class="remembered-facts muted" style="display:none;" aria-live="polite"></div>
          <div class="conversation-panel">
            <div id="transcriptPanel" class="transcript-panel" role="log" aria-label="Record of what was said">
              <div class="transcript-panel-label">Record of what was said</div>
              <div class="transcript-toolbar">
                <label for="transcriptDisplayMode">Display</label>
                <select id="transcriptDisplayMode" aria-label="Transcript display mode">
                  <option value="zh">Chinese only</option>
                  <option value="zh_en">Show English</option>
                </select>
                <label for="transcriptReplaySpeed">Speed</label>
                <select id="transcriptReplaySpeed" aria-label="Transcript replay speed">
                  <option value="0.8">0.8x</option>
                  <option value="1.0" selected>1.0x</option>
                  <option value="1.2">1.2x</option>
                </select>
                <label for="segmentModeToggle">Segment</label>
                <input id="segmentModeToggle" type="checkbox" aria-label="Enable segment selection" />
                <button id="replaySelectedBtn" type="button" disabled aria-label="Replay selected lines">Replay selected</button>
                <button id="stopReplayBtn" type="button" style="display:none;" aria-label="Stop replay">Stop</button>
              </div>
              <div id="replayStatus" class="replay-status" style="display:none;" aria-live="polite"></div>
              <div id="transcriptContent" class="transcript-content"></div>
            </div>
            <div class="current-turn">
              <div class="current-turn-label">Active conversation — last statement from MandarinOS</div>
              <!-- Phase 11C: Partner identity + voice line (shown on EXTEND frames) -->
              <div id="partnerHeader" class="partner-header" style="display:none;">
                <span id="partnerNameLabel" class="partner-name-label"></span>
                <span id="partnerPrefixLine" class="partner-prefix-line"></span>
              </div>
              <div class="frame-sentence-row">
                <div id="frameSentence" class="frame-sentence"></div>
                <button id="playQuestionBtn" type="button" class="play-question-speaker" title="Speak the question" aria-label="Play question">🔊</button>
                <button id="hintBtn" class="play-question-speaker hint-icon-btn" style="display:none;" title="Show hints" aria-label="Hint">?</button>
              </div>
              <!-- Phase 11C: discoverable fact (shown once per engine after depth threshold) -->
              <div id="partnerFactLine" class="partner-fact-line" style="display:none;"></div>
              <div id="hintPinyin"  class="hint-row hint-pinyin"  style="display:none;"></div>
              <div id="hintMeaning" class="hint-row hint-meaning"  style="display:none;"></div>
              <div id="hintEtymology" class="hint-row hint-etymology" style="display:none;"></div>
              <div id="actionLadder" class="action-ladder">
                <button id="tryRespondingBtn" class="action-ladder-btn mic-only" title="Speak your answer" aria-label="Speak your answer">🎤</button>
                <button id="showOptionsBtn" class="action-ladder-btn" type="button" title="Toggle suggested responses" aria-label="Toggle suggested responses">Suggested responses</button>
                <div id="reverseActionsRow" class="reverse-actions-row"></div>
              </div>
              <!-- English input panel: type English, get a Chinese translation suggestion -->
              <div id="engInputPanel" class="eng-input-panel">
                <div class="eng-input-row">
                  <input id="engInput" type="text" class="eng-input-field" placeholder="Type in English…" autocomplete="off" />
                  <button id="translateBtn" type="button" class="eng-translate-btn">Translate</button>
                </div>
                <div id="engTranslateResult" class="eng-translate-result" style="display:none;">
                  <button id="speakTranslationBtn" type="button" class="eng-speak-btn" title="Hear pronunciation">🔊</button>
                  <span id="engTranslatedZh" class="eng-translated-zh"></span>
                  <button id="useTranslationBtn" type="button" class="eng-use-btn">Use this ↑</button>
                </div>
              </div>
              <!-- Sentence-level response options: 2-3 answers + recovery panel -->
              <div id="sentenceOptionsContainer" class="sentence-options-container" style="display:none;"></div>
              <div id="optionsContainerParent"></div>
            </div>
          </div>

          <!-- Phase 7.4: Micro-gloss popover (singleton, repositioned on each token click) -->
          <div id="microGloss" class="microgloss" style="display:none;" role="dialog" aria-label="Word insight">
            <span id="microGlossHeadword" class="microgloss-headword"></span>
            <span id="microGlossBody" class="microgloss-body"></span>
            <div id="microGlossEtym" class="microgloss-etym" style="display:none;"></div>
            <button id="microGlossOpenCard" type="button" class="microgloss-open-card">Explore word</button>
          </div>

          <h2>Trace</h2>
          <pre id="trace" class="trace">(no trace)</pre>
        </section>
        <aside class="right">
          <h2>Explore word</h2>
          <div id="cardPanel" class="card hidden">
            <div id="cardError" class="error"></div>
            <h3 id="cardTitle"></h3>
            <div id="cardBody"></div>
          </div>
          <div id="noCard" class="nocard">No card opened</div>
        </aside>
      </main>
    </div>
    <style>
      section.left { overflow: visible; }
      .frame-sentence-row {
        display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
        margin-bottom: 0.5rem; min-height: 2.5rem;
      }
      .frame-sentence-row .frame-sentence { flex: 1 1 200px; min-width: 0; }
      .frame-sentence {
        font-size: 1.45rem; line-height: 1.6; min-height: 2.25rem;
        height: auto; overflow: visible; white-space: normal;
        position: relative; margin: 0;
        font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .play-question-speaker {
        flex-shrink: 0; width: 44px; height: 44px; padding: 0;
        border: 2px solid #1a56db; border-radius: 50%;
        background: #fff; color: #1a56db; font-size: 1.25rem; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .play-question-speaker:hover { background: #e8f0fe; }
      .frame-lit-token { color: #111; display: inline; }
      .frame-word-token { color: #1a56db; text-decoration: underline; cursor: pointer; display: inline; }

      /* Phase 7.4: token spans */
      .tok { display: inline; }
      .tok-word { color: #1a56db; cursor: pointer; }
      .tok-word:hover { text-decoration: underline; }
      .tok-word-unknown { color: #888; cursor: pointer; }
      /* Larger tap padding for mobile (overlap ok); avoids 44px-per-glyph row height */
      .word-insight-token { display: inline-block; padding: 6px 4px; margin: -2px 0; border-radius: 4px; }
      /* Option Chinese size/colour: see styles.css .option-hanzi-tokens */
      .tok-slot { border-bottom: 1px dotted #888; color: #555; }
      .tok-punct, .tok-space, .tok-other { color: #111; }

      /* Phase 7.4 + Mobile word insight: fixed-position popover (position set in JS) */
      .microgloss {
        position: fixed; z-index: 10000; background: #fff;
        border: 1px solid #ccc; border-radius: 8px; padding: 8px 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18); font: 0.9rem Arial, Helvetica, sans-serif;
        min-width: 148px; max-width: min(280px, calc(100vw - 24px)); max-height: min(50vh, 320px);
        overflow-y: auto; pointer-events: auto;
      }
      .microgloss-headword { font-weight: bold; display: block; margin-bottom: 4px; font-size: 1.05rem; }
      .microgloss-body { color: #444; font-size: 0.85rem; display: block; margin-bottom: 6px; }
      .microgloss-etym {
        font-size: 0.78rem; color: #6b7280; display: block; margin-bottom: 8px; line-height: 1.35;
      }
      .microgloss-open-card {
        font-size: 0.82rem; color: #1a56db; background: none;
        border: 1px solid #1a56db; border-radius: 4px; padding: 2px 8px; cursor: pointer;
      }
      .microgloss-open-card:hover { background: #e8f0fe; }

      /* Phase 7.4: Action Ladder */
      .action-ladder { margin: 12px 0 16px 0; display: flex; gap: 10px; flex-wrap: wrap; }
      .action-ladder-btn {
        font: 0.9rem Arial, Helvetica, sans-serif; padding: 8px 16px; border-radius: 8px;
        border: 2px solid #1a56db; background: #fff; color: #1a56db; cursor: pointer;
        font-weight: 500;
      }
      .action-ladder-btn:hover { background: #e8f0fe; }
      .action-ladder-help { border-color: #e67e22; color: #e67e22; }
      .action-ladder-help:hover { background: #fef3e2; }
      .action-ladder-btn.mic-only { padding: 8px 12px; font-size: 1.1rem; min-width: 44px; }
      .hint-icon-btn {
        width: 44px;
        height: 44px;
        min-width: 44px;
        padding: 0;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        line-height: 1;
      }
      /* showOptionsBtn removed — sentence options now always visible */
      .hint-btn-inline { margin: 0; }
      .hint-row { margin-top: 6px; }
      #optionsContainerParent { margin-top: 10px; }
      /* Sentence-level response options — use standard .option-panel structure */
      .sentence-options-container {
        margin-top: 6px; display: flex; flex-direction: column; gap: 0;
      }
      /* #reverseActionsRow lives inside frame-sentence-row, inline with 🔊 and ? */
      .reverse-actions-row {
        display: inline-flex; gap: 6px; flex-wrap: nowrap; align-items: center;
        flex-shrink: 0;
      }
      .sentence-reverse-row {
        display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
      }
      .sentence-reverse-btn {
        padding: 6px 10px; border-radius: 8px; font-size: 0.85rem;
        border: 1.5px solid #0d9488; background: #f0fdf9; color: #0f766e;
        cursor: pointer; font-weight: 500;
        white-space: nowrap;
      }
      .sentence-reverse-btn:hover { background: #ccfbf1; }

      /* English → Chinese input panel — sits between mic button and response option cards */
      .eng-input-panel {
        margin-top: 8px; padding-top: 8px;
        border-top: 1px solid #e5e7eb;
      }
      .eng-input-row {
        display: flex; gap: 6px; align-items: center;
      }
      .eng-input-field {
        flex: 1; padding: 7px 10px; border-radius: 8px;
        border: 1.5px solid #d1d5db; font: 0.9rem Arial, Helvetica, sans-serif;
        outline: none;
      }
      .eng-input-field:focus { border-color: #1a56db; }
      .eng-translate-btn {
        padding: 7px 14px; border-radius: 8px;
        border: 1.5px solid #1a56db; background: #fff; color: #1a56db;
        font: 0.9rem Arial, Helvetica, sans-serif; cursor: pointer; white-space: nowrap;
      }
      .eng-translate-btn:hover { background: #e8f0fe; }
      .eng-translate-btn:disabled { opacity: 0.5; cursor: default; }
      .eng-translate-result {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin-top: 8px; padding: 8px 10px;
        background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 8px;
      }
      .eng-translated-zh {
        flex: 1; font: 1.15rem "Ma Shan Zheng", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        color: #166534; min-width: 0;
      }
      .eng-speak-btn {
        flex-shrink: 0; width: 34px; height: 34px; padding: 0;
        border: 1.5px solid #0d9488; border-radius: 50%;
        background: #fff; color: #0d9488; font-size: 1rem; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .eng-speak-btn:hover { background: #ccfbf1; }
      .eng-use-btn {
        padding: 5px 12px; border-radius: 7px;
        border: 1.5px solid #16a34a; background: #16a34a; color: #fff;
        font: 0.85rem Arial, Helvetica, sans-serif; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      }
      .eng-use-btn:hover { background: #15803d; border-color: #15803d; }

      /* Phase 7.4: ui_mode visual states */
      .ui-mode-read    .options-area { opacity: 0.45; pointer-events: none; }
      .ui-mode-respond .options-area { opacity: 1;    pointer-events: auto; }

      /* Phase 11C: Persona bar */
      .persona-bar {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin: 8px 0 4px 0; min-height: 34px;
      }
      .persona-bar-label {
        font: 0.82rem Arial, Helvetica, sans-serif; color: #6b7280; white-space: nowrap;
      }
      .persona-btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
      .persona-btn {
        font: 0.88rem "Ma Shan Zheng", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        padding: 4px 12px; border-radius: 16px;
        border: 1.5px solid #d1d5db; background: #f9fafb; color: #374151;
        cursor: pointer; transition: border-color 0.15s, background 0.15s;
        white-space: nowrap;
      }
      .persona-btn:hover { border-color: #1a56db; background: #e8f0fe; color: #1a56db; }
      .persona-btn.active { border-color: #1a56db; background: #1a56db; color: #fff; }
      .persona-btn-none {
        font: 0.82rem Arial, Helvetica, sans-serif;
        padding: 4px 10px; border-radius: 16px;
        border: 1.5px dashed #d1d5db; background: transparent; color: #9ca3af;
        cursor: pointer;
      }
      .persona-btn-none.active { border-color: #9ca3af; background: #f3f4f6; color: #6b7280; }

      /* Phase 11C: Partner header inside active conversation panel */
      .partner-header {
        display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
        margin-bottom: 6px; padding-bottom: 6px;
        border-bottom: 1px solid #e5e7eb;
      }
      .partner-name-label {
        font: 600 0.88rem "Ma Shan Zheng", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        color: #1a56db; white-space: nowrap; flex-shrink: 0;
      }
      .partner-prefix-line {
        font: 1rem "Ma Shan Zheng", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        color: #374151; font-style: italic;
      }

      /* Phase 11C: Discoverable fact — shown below the frame sentence, lighter weight */
      .partner-fact-line {
        margin-top: 6px; padding: 6px 10px;
        font: italic 0.92rem "Ma Shan Zheng", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
        color: #6b7280;
        border-left: 3px solid #d1d5db;
        border-radius: 0 4px 4px 0;
        background: #f9fafb;
      }

      /* Phase 8: Conversation — history (shaded) vs active (white, bordered focus) */
      .conversation-panel {
        border: none;
        border-radius: 10px;
        padding: 0;
        margin: 12px 0;
        background: transparent;
      }
      /* Conversation history: shaded so it doesn’t compete for attention */
      .transcript-panel {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 8px 10px;
        margin: 0 0 12px 0;
        max-height: 180px;
        overflow-y: auto;
        background: #e5e7eb;
        color: #4b5563;
      }
      .transcript-content { line-height: 1.5; }
      .transcript-line { margin-bottom: 6px; display: flex; align-items: baseline; flex-wrap: wrap; }
      .transcript-line .turn-marker {
        font: 0.9rem Arial, Helvetica, sans-serif; font-weight: 600;
        min-width: 3.7em; flex-shrink: 0; margin-right: 1px;
      }
      .transcript-line.partner .turn-marker { color: #1e40af; }
      .transcript-line.user .turn-marker { color: #0f766e; }
      .transcript-line.partner .transcript-text { color: #1e40af; }
      .transcript-line.user .transcript-text { color: #0d9488; }
      .transcript-text.transcript-zh { font: 1rem "Noto Sans SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .transcript-text.transcript-en { font: 0.9rem Arial, Helvetica, sans-serif; }
      .transcript-panel-label {
        font: 0.85rem Arial, Helvetica, sans-serif; color: #6b7280; margin-bottom: 6px;
      }
      .transcript-toolbar {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .transcript-toolbar label {
        font: 0.8rem Arial, Helvetica, sans-serif; color: #6b7280;
      }
      .transcript-toolbar select, .transcript-toolbar button {
        font: 0.8rem Arial, Helvetica, sans-serif;
        padding: 3px 6px;
      }
      .replay-status {
        font: 0.8rem Arial, Helvetica, sans-serif;
        color: #1e40af;
        margin-bottom: 6px;
      }
      .transcript-line {
        justify-content: space-between;
      }
      .transcript-main {
        display: flex; align-items: baseline; flex-wrap: wrap; min-width: 0; flex: 1;
      }
      .transcript-actions {
        display: flex; gap: 4px; flex-shrink: 0;
      }
      .transcript-action-btn {
        font: 0.75rem Arial, Helvetica, sans-serif;
        border: 1px solid #9ca3af;
        background: #f9fafb;
        border-radius: 4px;
        padding: 1px 5px;
        cursor: pointer;
      }
      .transcript-action-btn:hover { background: #e5e7eb; }
      .transcript-line.active-replay {
        background: rgba(37, 99, 235, 0.08);
        border-radius: 6px;
      }
      .transcript-line-detail {
        margin-left: 3.95em;
        font: 0.85rem Arial, Helvetica, sans-serif;
        color: #374151;
      }
      .transcript-select {
        margin-right: 6px;
      }
      /* Active conversation: white window with border to draw attention; buttons live here */
      .current-turn {
        margin-top: 0;
        background: #fff;
        border: 2px solid #1a56db;
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: 0 2px 8px rgba(26, 86, 219, 0.12);
      }
      .current-turn-label {
        font: 0.9rem Arial, Helvetica, sans-serif; font-weight: 600; color: #1a56db; letter-spacing: 0.02em;
        margin-bottom: 8px;
      }
      .hint-row { font: 0.9rem Arial, Helvetica, sans-serif; }
    </style>
    <script type="module" src="/app.js"></script>
  </body>
</html>
