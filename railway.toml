[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python scripts/ui_server.py"

# ── Persistent storage ────────────────────────────────────────────────────────
# Progress snapshots, learner memory, and beta profiles are written to
# BASE_DATA_DIR = os.environ.get("MANDARINOS_DATA_DIR", "<repo>/data").
#
# Without a persistent volume, all learner data is lost on every redeploy
# or container restart (the repo-local data/ directory is ephemeral and
# is .gitignore-d so it is never part of the deployed image).
#
# Required Railway dashboard steps to make progress history durable:
#   1. Railway dashboard → your service → Volumes tab
#      → Add Volume, mount path: /data
#   2. Railway dashboard → your service → Variables tab
#      → Add  MANDARINOS_DATA_DIR = /data
#
# The app reads MANDARINOS_DATA_DIR at startup (progress_store.py,
# beta_profile.py, learner_memory.py all use it) — no code changes needed
# once the volume and variable are set.

# ── Beta-code handoff (MandarinOS.app) ────────────────────────────────────────
# scripts/beta_code_validation.py calls the website server-to-server to
# check whether a beta_code is still active. Optional; defaults to
# https://www.mandarinos.app if unset (www, not apex — Vercel 308s the
# apex host and urllib does not follow 308 on POST). Only used to POST
# {"betaCode": "..."} to <base>/api/beta/validate and read back
# {"valid": bool} — no participant identity ever crosses this boundary.
# If setting MANDARINOS_WEBSITE_URL in Railway, use the www host (or any
# base that does not 308), not https://mandarinos.app.
#
# This app's own /api/beta_code/validate (called by the browser) always
# converts the result to a tri-state {"status": "valid"|"invalid"|
# "temporarily_unavailable"}. If the website is unreachable, times out,
# returns a non-2xx status, or an unexpected body, the result is
# "temporarily_unavailable" — NEVER "valid". The browser then decides
# whether an already-confirmed code may keep being used this session
# (see ui/app.js _validateBetaCode rule B) — a brand-new/never-confirmed
# code is never activated just because the website is unreachable (rule
# A). This variable is safe to leave unset in local/dev environments.
#   MANDARINOS_WEBSITE_URL = https://www.mandarinos.app
#
# ── Beta-code session capture (optional, off by default) ──────────────────
# MANDARINOS_SESSION_CAPTURE=1 enables scripts/session_intelligence.py's
# session_record_v1 export (includes beta_code). Unset/not "1" = disabled.
# Whether this is currently set in the live Railway dashboard is NOT
# verifiable from this repository (same class of fact as the Railway
# branch-watch configuration — see docs/ARCHITECTURAL_DECISIONS.md
# ADR-015) and must be confirmed operationally, not assumed from code.
